<style>
  .capability-chart {
    width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #ffffff;
    margin: 24px 0;
  }
  .capability-chart .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .capability-chart table {
    width: 100%;
    border-collapse: collapse;
  }
  .capability-chart th {
    padding: 12px 10px;
    text-align: left;
    font-weight: 600;
    color: #888;
    border-bottom: 1px solid #333;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .capability-chart td {
    padding: 12px 10px;
    border-bottom: 1px solid #222;
    font-size: 14px;
  }
  .capability-chart .capability-label {
    font-weight: 500;
  }
  .capability-chart .capability-high {
    color: #4ade80;
  }
  .capability-chart .capability-medium {
    color: #facc15;
  }
  .capability-chart .capability-low {
    color: #f87171;
  }
  .capability-chart .count {
    color: #e0e0e0;
    font-variant-numeric: tabular-nums;
  }
  .capability-chart .percent {
    color: #888;
    font-variant-numeric: tabular-nums;
  }
  .capability-chart .bar-cell {
    width: 50%;
  }
  .capability-chart .bar-container {
    background-color: #222;
    border-radius: 4px;
    height: 8px;
    width: 100%;
    overflow: hidden;
  }
  .capability-chart .bar-fill-high {
    background-color: #4ade80;
    height: 100%;
    border-radius: 4px;
  }
  .capability-chart .bar-fill-medium {
    background-color: #facc15;
    height: 100%;
    border-radius: 4px;
  }
  .capability-chart .bar-fill-low {
    background-color: #f87171;
    height: 100%;
    border-radius: 4px;
  }
</style>

<div class="capability-chart">
  <div class="chart-title">Capability Distribution</div>
  <table>
    <thead>
      <tr>
        <th>Capability</th>
        <th>Count</th>
        <th>% of 100</th>
        <th class="bar-cell"></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="capability-label capability-high">High</td>
        <td class="count">1</td>
        <td class="percent">1%</td>
        <td class="bar-cell">
          <div class="bar-container">
            <div class="bar-fill-high" style="width: 1%;"></div>
          </div>
        </td>
      </tr>
      <tr>
        <td class="capability-label capability-medium">Medium</td>
        <td class="count">46</td>
        <td class="percent">46%</td>
        <td class="bar-cell">
          <div class="bar-container">
            <div class="bar-fill-medium" style="width: 46%;"></div>
          </div>
        </td>
      </tr>
      <tr>
        <td class="capability-label capability-low">Low</td>
        <td class="count">53</td>
        <td class="percent">53%</td>
        <td class="bar-cell">
          <div class="bar-container">
            <div class="bar-fill-low" style="width: 53%;"></div>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
  <div style="margin-top: 12px; padding: 10px; background-color: rgba(248, 113, 113, 0.1); border-radius: 6px; border-left: 3px solid #f87171;">
    <span style="color: #f87171; font-size: 12px; font-weight: 500;">Lowest High Capability rate of any vertical (1%)</span>
    <span style="color: #888; font-size: 12px; margin-left: 8px;">— only Delft achieves High</span>
  </div>
</div>
